<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Distance Router</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="sidebar">
      <div id="controls">
        <h3>Кое е най-близкото кино до мен?</h3>
        <div><strong>1.</strong> Задай начална точка върху картата.</div>
        <div style="margin-top: 15px">
          <button id="calc-btn" disabled>Изчисли пътищата</button>
        </div>
      </div>

      <div id="table-container">
        <table id="cinema-table">
          <thead>
            <tr>
              <th>Име на кино</th>
              <th>Разстояние (в минути)</th>
            </tr>
          </thead>
          <tbody id="cinema-table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="map"></div>

    <div id="loader-overlay">
      <div class="spinner"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="script.js"></script>
  </body>
</html>
